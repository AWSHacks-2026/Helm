name: Overlord merge conflict demo

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve demo conflict via Overlord
        env:
          OVERLORD_API_BASE: ${{ secrets.OVERLORD_API_BASE }}
        run: |
          if [ -z "$OVERLORD_API_BASE" ]; then
            echo "Set repository secret OVERLORD_API_BASE to your shared Overlord URL"
            exit 1
          fi
          curl -sf -X POST "$OVERLORD_API_BASE/integrations/git/merge-conflict" \
            -H 'Content-Type: application/json' \
            -d @overlord/demo/fixtures/git_merge_request.json | python3 -m json.tool
