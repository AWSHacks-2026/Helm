name: vinyl_catalog
description: Record collection — agents conflict on genre metadata for tracks.
base_dir: base
assignments:
  - id: agent_alpha
    feature: |
      Add a genres: list[str] field on each Track dataclass and include genres
      in to_dict() output. Normalize genre strings to lowercase unique sorted list.
    files:
      - app/catalog/tracks.py
    acceptance:
      must_include:
        - genres
      must_include_any:
        - - genre
  - id: agent_beta
    feature: |
      Add a decade: int | None field on Track and expose in to_dict().
      When decade is set, also store original_release_year for reference.
    files:
      - app/catalog/tracks.py
    acceptance:
      must_include:
        - decade
      must_include_any:
        - release_year