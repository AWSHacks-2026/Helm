name: trail_rations
description: Hiking meal planning — agents conflict on calorie totals for meals.
base_dir: base
assignments:
  - id: agent_alpha
    feature: |
      Add per-meal calories field using standard factors (carbs 4kcal/g, protein 4, fat 9).
      Sum into daily_total on the plan.
    files:
      - app/planning/meal_estimator.py
    acceptance:
      must_include:
        - calories
        - daily_total
  - id: agent_beta
    feature: |
      Add optional protein_g field per meal and include in calorie calculation.
      Expose protein_g in meal dict for the planner output.
    files:
      - app/planning/meal_estimator.py
    acceptance:
      must_include:
        - protein
        - calories